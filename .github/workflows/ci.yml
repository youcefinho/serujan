name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule les runs en cours sur la même branche quand un nouveau push arrive
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Build · Type-check · Tests · Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache des dépendances
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Type-check (TypeScript strict)
        run: bunx tsc --noEmit

      - name: Lint (ESLint, 0 warning toléré)
        run: bunx eslint . --max-warnings=0

      - name: Tests (Vitest)
        run: bun run test

      - name: Build (Vite production)
        run: bun run build
